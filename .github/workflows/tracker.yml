name: Emulation Dependency Tracker

on:
  schedule:
    - cron: '0 */3 * * *' # Runs every 3 hours
  workflow_dispatch: # Allows manual trigger via GitHub UI

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Run Tracker Script
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: python cloud_tracker.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "Cloud-Tracker-Bot"
        git config --global user.email "tracker-bot@github.com"
        git add updates_log.md tracked_state.json
        git diff-index --quiet HEAD || git commit -m "Update dependency logs [skip ci]"
        git push
